  <!-- Background -->
  <rect width="980" height="460" fill="#F1F5F9"/>

  <!-- ─── 1. CRON ─── -->
  <rect x="16" y="165" width="116" height="120" rx="12" fill="white" stroke="#FCD34D" stroke-width="2" filter="url(#sh)"/>
  <rect x="16" y="165" width="116" height="28" rx="12" fill="#FEF3C7"/>
  <rect x="16" y="181" width="116" height="12" fill="#FEF3C7"/>
  <text x="74" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#92400E">Scheduled Task</text>
  <use href="#i-clock" x="55" y="200" width="38" height="38"/>
  <text x="74" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">07:01 KST</text>
  <text x="74" y="274" text-anchor="middle" font-size="9.5" fill="#9CA3AF">매일 자동 실행</text>

  <!-- arrow: cron → local -->
  <line x1="132" y1="225" x2="158" y2="225" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── 2. LOCAL MACHINE ─── -->
  <rect x="158" y="24" width="390" height="408" rx="14" fill="white" stroke="#93C5FD" stroke-width="2" filter="url(#sh)"/>
  <rect x="158" y="24" width="390" height="30" rx="14" fill="#EFF6FF"/>
  <rect x="158" y="40" width="390" height="14" fill="#EFF6FF"/>
  <text x="353" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">로컬 머신 (Claude Code)</text>

  <!-- WebSearch -->
  <rect x="174" y="70" width="168" height="112" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <use href="#i-search" x="257" y="84" width="34" height="34"/>
  <text x="258" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#15803D">WebSearch</text>
  <text x="258" y="153" text-anchor="middle" font-size="9.5" fill="#166534">뉴스 수집</text>

  <!-- Claude AI -->
  <rect x="358" y="70" width="172" height="112" rx="10" fill="#FAF5FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <use href="#i-robot" x="441" y="84" width="34" height="34"/>
  <text x="444" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#7C3AED">Claude AI</text>
  <text x="444" y="153" text-anchor="middle" font-size="9.5" fill="#6D28D9">카드뉴스 작성</text>

  <!-- arrows row 1 -->
  <line x1="342" y1="126" x2="358" y2="126" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="258" y1="182" x2="258" y2="208" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="444" y1="182" x2="444" y2="208" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Pexels -->
  <rect x="174" y="208" width="168" height="112" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1.5"/>
  <use href="#i-camera" x="257" y="222" width="34" height="34"/>
  <text x="258" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#EA580C">Pexels API</text>
  <text x="258" y="291" text-anchor="middle" font-size="9.5" fill="#9A3412">사진 자동 매칭</text>

  <!-- cards.json -->
  <rect x="358" y="208" width="172" height="112" rx="10" fill="#F0F9FF" stroke="#7DD3FC" stroke-width="1.5"/>
  <use href="#i-doc" x="441" y="222" width="34" height="34"/>
  <text x="444" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#0369A1">cards.json</text>
  <text x="444" y="291" text-anchor="middle" font-size="9.5" fill="#0C4A6E">업데이트</text>

  <!-- arrow: pexels → cards -->
  <line x1="342" y1="264" x2="358" y2="264" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Terminal -->
  <rect x="174" y="342" width="356" height="68" rx="10" fill="#111827"/>
  <text x="192" y="364" font-size="10.5" fill="#4ADE80" font-family="monospace">$ git add src/data/cards.json</text>
  <text x="192" y="382" font-size="10.5" fill="#4ADE80" font-family="monospace">$ git commit &amp;&amp; git push origin main</text>
  <text x="510" y="400" font-size="9" fill="#6B7280" text-anchor="middle">git push</text>

  <!-- arrow: local → github -->
  <line x1="548" y1="225" x2="588" y2="225" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── 3. GITHUB ─── -->
  <rect x="588" y="118" width="140" height="130" rx="12" fill="white" stroke="#D1D5DB" stroke-width="2" filter="url(#sh)"/>
  <rect x="588" y="118" width="140" height="28" rx="12" fill="#F3F4F6"/>
  <rect x="588" y="134" width="140" height="12" fill="#F3F4F6"/>
  <text x="658" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#1F2937">GitHub</text>
  <use href="#i-github" x="622" y="154" width="40" height="40"/>
  <text x="658" y="214" text-anchor="middle" font-size="10" fill="#374151">today-1-minute</text>
  <text x="658" y="230" text-anchor="middle" font-size="9" fill="#9CA3AF">main branch</text>

  <!-- arrow: github → actions -->
  <line x1="658" y1="248" x2="658" y2="276" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── 4. GITHUB ACTIONS ─── -->
  <rect x="588" y="276" width="140" height="120" rx="12" fill="white" stroke="#FCA5A5" stroke-width="2" filter="url(#sh)"/>
  <rect x="588" y="276" width="140" height="28" rx="12" fill="#FEF2F2"/>
  <rect x="588" y="292" width="140" height="12" fill="#FEF2F2"/>
  <text x="658" y="291" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">GitHub Actions</text>
  <use href="#i-gear" x="622" y="312" width="40" height="40"/>
  <text x="658" y="368" text-anchor="middle" font-size="9.5" fill="#374151">ait build → ait deploy</text>

  <!-- arrow: actions → 앱인토스 -->
  <line x1="728" y1="336" x2="778" y2="336" stroke="#6B7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ─── 5. 앱인토스 ─── -->
  <rect x="778" y="118" width="176" height="238" rx="12" fill="white" stroke="#93C5FD" stroke-width="2" filter="url(#sh)"/>
  <rect x="778" y="118" width="176" height="28" rx="12" fill="#EFF6FF"/>
  <rect x="778" y="134" width="176" height="12" fill="#EFF6FF"/>
  <text x="866" y="133" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">앱인토스</text>
  <use href="#i-toss" x="846" y="158" width="40" height="40"/>
  <text x="866" y="218" text-anchor="middle" font-size="11" font-weight="600" fill="#1F2937">Apps in Toss</text>
  <line x1="796" y1="232" x2="938" y2="232" stroke="#DBEAFE" stroke-width="1"/>
  <text x="866" y="256" text-anchor="middle" font-size="9.5" fill="#6B7280">버전 관리</text>
  <text x="866" y="274" text-anchor="middle" font-size="9.5" fill="#6B7280">자동 배포</text>
  <text x="866" y="292" text-anchor="middle" font-size="9.5" fill="#6B7280">롤백 지원</text>
  <text x="866" y="310" text-anchor="middle" font-size="9.5" fill="#6B7280">긴급 점검</text>
  <text x="866" y="344" text-anchor="middle" font-size="9" fill="#BFDBFE">하루1분 미니앱</text>
</svg>
